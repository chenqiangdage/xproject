server:
  port: 8080

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
  cloud:
    nacos:
      username: nacos
      password: 123456
      config:
        enabled: false
      discovery:
        server-addr: 127.0.0.1:8848
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
        - id: jiajiebang-service
          uri: lb://jiajiebang-service
          predicates:
            - Path=/api/jiajiebang/**
        # Swagger API 文档路由
        - id: auth-service-docs
          uri: lb://auth-service
          predicates:
            - Path=/auth-service/v3/api-docs/**
        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/user-service/v3/api-docs/**
        - id: order-service-docs
          uri: lb://order-service
          predicates:
            - Path=/order-service/v3/api-docs/**
        - id: jiajiebang-service-docs
          uri: lb://jiajiebang-service
          predicates:
            - Path=/jiajiebang-service/v3/api-docs/**

springdoc:
  swagger-ui:
    urls:
      - name: 认证服务
        url: /auth-service/v3/api-docs
      - name: 用户服务
        url: /user-service/v3/api-docs
      - name: 订单服务
        url: /order-service/v3/api-docs
      - name: 家洁帮服务
        url: /jiajiebang-service/v3/api-docs
