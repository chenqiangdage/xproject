server:
  port: 8080

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
  cloud:
    nacos:
      username: nacos
      password: 123456
      config:
        enabled: false
      discovery:
        server-addr: 127.0.0.1:8848
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**

springdoc:
  swagger-ui:
    urls:
      - name: 认证服务
        url: /v3/api-docs?group=auth-service
      - name: 用户服务
        url: /v3/api-docs?group=user-service
      - name: 订单服务
        url: /v3/api-docs?group=order-service
